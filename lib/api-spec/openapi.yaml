openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UP Dash - B2B fashion analytics intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client (brand) management
  - name: analytics
    description: Analytics & reporting
  - name: notifications
    description: Notification center
  - name: savedViews
    description: Saved dashboard views
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout (optionally revoke a refresh token server-side)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients (admin only)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
          description: |
            When both dateFrom and dateTo are provided, each client row in the
            response is enriched with `avgOrderValue`, `conversionRate`, and
            `periodGrowthPct` computed over that window (versus the previous
            window of equal length for growth).
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedClients"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client by id
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/dashboard:
    get:
      operationId: getDashboard
      tags: [analytics]
      summary: Dashboard KPIs and time-series
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: category
          schema:
            type: string
          description: Restrict revenue/order metrics to a single product category.
        - in: query
          name: sellerId
          schema:
            type: string
          description: Restrict order metrics to a single seller.
        - in: query
          name: channel
          schema:
            type: string
          description: Restrict to orders from customers acquired via a UTM source (e.g. instagram, google).
        - in: query
          name: segment
          schema:
            type: string
          description: Restrict to orders from customers in a specific RFM segment (VIP, Loyal, etc.).
        - in: query
          name: compare
          schema:
            type: boolean
          description: |
            When true, the response also includes prior-period equivalents
            (`prevKpis`, `prevRevenueOverTime`, `prevOrdersOverTime`) covering
            the immediately preceding window of the same length. Use this so
            the client can render accurate "vs. previous period" change
            indicators in a single request.
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  /analytics/funnel:
    get:
      operationId: getFunnel
      tags: [analytics]
      summary: Conversion funnel analytics
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Funnel payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"

  /analytics/customers:
    get:
      operationId: getCustomers
      tags: [analytics]
      summary: Paginated customers with RFM segmentation
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: rfmSegment
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCustomers"

  /analytics/customers/summary:
    get:
      operationId: getCustomerSummary
      tags: [analytics]
      summary: CRM KPI strip — registrations, approvals, buyers, time-to-purchase
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: compare
          schema:
            type: boolean
          description: |
            When true the response also includes prevKpis for the immediately
            preceding window of equal length.
      responses:
        "200":
          description: Customer summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSummaryResponse"

  /analytics/customers/{customerId}:
    get:
      operationId: getCustomerDetail
      tags: [analytics]
      summary: Full CRM profile for a single customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/products:
    get:
      operationId: getProducts
      tags: [analytics]
      summary: Product performance ranking
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [revenue, units, created]
            default: revenue
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring match against the SKU or product name.
        - in: query
          name: sku
          schema:
            type: string
          description: Case-insensitive substring match against the SKU only (legacy).
        - in: query
          name: category
          schema:
            type: string
          description: Exact-match filter on product category.
      responses:
        "200":
          description: Product list with metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductMetrics"

  /analytics/products/summary:
    get:
      operationId: getProductsSummary
      tags: [analytics]
      summary: Sales Power KPI — avg revenue per active SKU per day vs prior period
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Products summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsSummaryResponse"

  /analytics/products/{productId}:
    get:
      operationId: getProductDetail
      tags: [analytics]
      summary: Full performance profile for a single product
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Product detail payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/products/{productId}/customers:
    get:
      operationId: getProductCustomers
      tags: [analytics]
      summary: Paginated list of customers who purchased this product
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated buyer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCustomersResponse"

  /analytics/sellers:
    get:
      operationId: getSellers
      tags: [analytics]
      summary: Seller leaderboard
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Ranked seller list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellerMetrics"

  /analytics/sellers/{sellerId}/customers:
    get:
      operationId: getSellerCustomers
      tags: [analytics]
      summary: Paginated top buyers for a single seller
      parameters:
        - in: path
          name: sellerId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated seller customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCustomersResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/sellers/{sellerId}/orders:
    get:
      operationId: getSellerOrders
      tags: [analytics]
      summary: Paginated recent orders for a single seller
      parameters:
        - in: path
          name: sellerId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Paginated seller orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerOrdersResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/sellers/{sellerId}:
    get:
      operationId: getSellerDetail
      tags: [analytics]
      summary: Full performance profile for a single seller
      parameters:
        - in: path
          name: sellerId
          required: true
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Seller detail payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/stock:
    get:
      operationId: getStock
      tags: [analytics]
      summary: Stock intelligence — coverage, risk classification, and breakdowns
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
        - in: query
          name: sort
          schema:
            type: string
            enum: [sku, name, category, stock, dailyVelocity, coverageDays, risk, unitsSold, lastRestockDate]
            default: coverageDays
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive match against SKU or product name.
        - in: query
          name: category
          schema:
            type: string
          description: Filter by exact category.
        - in: query
          name: risk
          schema:
            type: string
            enum: [Stockout, Overstock, Healthy]
          description: Filter by risk classification.
      responses:
        "200":
          description: Stock intelligence payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStockResponse"

  /analytics/journey:
    get:
      operationId: getJourney
      tags: [analytics]
      summary: Journey analytics — event-path KPIs, top paths, event flow graph, buyers vs non-buyers
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Journey analytics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"

  /analytics/rfm:
    get:
      operationId: getRfm
      tags: [analytics]
      summary: RFM segmentation — segment aggregates, composition timeseries, customer table
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
        - in: query
          name: segment
          schema:
            type: string
          description: Filter by RFM segment name
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, segment, recencyDays, frequency, monetary]
            default: monetary
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: RFM segmentation payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfmResponse"

  /analytics/geography:
    get:
      operationId: getGeography
      tags: [analytics]
      summary: Geographic breakdown by state and city
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Geography payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeographyResponse"

  /analytics/orders:
    get:
      operationId: getOrdersByDate
      tags: [analytics]
      summary: Drill-down list of orders for a single day
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Orders payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersByDateResponse"

  /analytics/insight:
    get:
      operationId: getInsight
      tags: [analytics]
      summary: AI-generated insight for current dashboard window
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: screen
          schema:
            type: string
            enum: [dashboard, marketing, customers, products, sellers, stock, journey, rfm]
            default: dashboard
      responses:
        "200":
          description: Insight payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"
    post:
      operationId: regenerateInsight
      tags: [analytics]
      summary: Force regenerate the AI insight (skip cache)
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: screen
          schema:
            type: string
            enum: [dashboard, marketing, customers, products, sellers, stock, journey, rfm]
            default: dashboard
      responses:
        "200":
          description: Insight payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"

  /analytics/alerts:
    get:
      operationId: getAlerts
      tags: [analytics]
      summary: Inventory alerts (low stock and predicted stockouts)
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: horizonDays
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
          description: Days ahead to predict stockouts based on recent sales velocity.
        - in: query
          name: lookbackDays
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 180
          description: Days of recent sales used to compute average daily demand.
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Inventory alerts payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

  /analytics/admin/overview:
    get:
      operationId: getAdminOverview
      tags: [analytics]
      summary: Platform-wide overview across every client (admin only)
      description: |
        Aggregate KPIs, daily revenue/orders time-series summed across every
        client, plus per-client growth ranking (top performers, top growth,
        bottom growth). Restricted to ADMIN users.
      parameters:
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Platform overview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOverviewResponse"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/marketing:
    get:
      operationId: getMarketing
      tags: [analytics]
      summary: Marketing performance — ad spend, ROAS, CPL, and creatives breakdown
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: creativesPage
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: creativesPageSize
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Marketing performance payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingResponse"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current client/tenant
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Notification list with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark every notification for this client as read
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"

  /notifications/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationReadRequest"
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-views:
    get:
      operationId: listSavedViews
      tags: [savedViews]
      summary: List the current user's saved views for the active client
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: Saved view list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedView"
    post:
      operationId: createSavedView
      tags: [savedViews]
      summary: Save the current dashboard filter set as a named view
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedViewRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"

  /saved-views/{viewId}:
    delete:
      operationId: deleteSavedView
      tags: [savedViews]
      summary: Delete a saved view owned by the current user
      parameters:
        - in: path
          name: viewId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
          enum: [ok, error]
        uptime:
          type: number
      required: [status, db, uptime]

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        code:
          type: string
        message:
          type: string
        status:
          type: integer
      required: [error, code, message, status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, CLIENT]
        clientId:
          type: ["string", "null"]
      required: [id, email, firstName, lastName, role]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [accessToken, refreshToken, user]

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        apiKey:
          type: string
        revenueYtd:
          type: number
        ordersYtd:
          type: integer
        leadsYtd:
          type: integer
        approvedLeads:
          type: integer
        isActive:
          type: boolean
        currency:
          type: string
          description: ISO 4217 currency code, e.g. BRL, USD
        locale:
          type: string
          description: BCP 47 locale, e.g. pt-BR, en-US
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        avgOrderValue:
          type: number
          description: |
            Optional. Average order value (revenue / orders) over the requested
            window. Only present on /clients responses when both `dateFrom` and
            `dateTo` are supplied.
        conversionRate:
          type: number
          description: |
            Optional. Visit-to-purchase conversion rate as a percentage over
            the requested window. Only present on enriched /clients responses.
        periodGrowthPct:
          type: ["number", "null"]
          description: |
            Optional. Revenue growth versus the prior window of equal length
            (in percent). `null` when the prior window had zero revenue and
            the current window has zero revenue too. Only present on enriched
            /clients responses.
        periodRoas:
          type: ["number", "null"]
          description: |
            Optional. ROAS for the period (period revenue / prorated ad spend).
            `null` when the client has no creatives with spend in the window.
            Only present on enriched /clients responses.
        periodLeads:
          type: ["integer", "null"]
          description: |
            Optional. Prorated ad-channel leads (REGISTRATION events) in the
            requested period. Only present on enriched /clients responses.
        periodApprovalRate:
          type: ["number", "null"]
          description: |
            Optional. Lead approval rate (approvedLeads / totalLeads × 100).
            `null` when there are zero leads. Only present on enriched /clients responses.
      required:
        - id
        - name
        - email
        - apiKey
        - revenueYtd
        - ordersYtd
        - leadsYtd
        - approvedLeads
        - isActive
        - currency
        - locale
        - createdAt
        - updatedAt

    PaginatedClients:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [data, total, page, pages]

    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        apiKey:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code (default BRL)
        locale:
          type: string
          description: BCP 47 locale (default pt-BR)
      required: [name, email, apiKey]

    DashboardSignal:
      type: object
      properties:
        type:
          type: string
          enum: [high_traffic_low_sales, high_performing_regions]
        severity:
          type: string
          enum: [info, warning, critical]
        title:
          type: string
        body:
          type: string
        meta:
          type: object
          additionalProperties: true
          description: Optional extra context (region names, conversion %, etc.).
      required: [type, severity, title, body]

    DashboardKpis:
      type: object
      properties:
        revenue:
          type: number
        orders:
          type: integer
        avgTicket:
          type: number
        conversionRate:
          type: number
        approvalRate:
          type: number
        leads:
          type: integer
        approvedLeads:
          type: integer
        customers:
          type: integer
        repeatCustomers:
          type: integer
        requestedRevenue:
          type: number
          description: Sum of ALL order amounts in the period regardless of status (PENDING included).
        newBuyers:
          type: integer
          description: Distinct buyers whose first ever purchase falls in this window.
        returningBuyers:
          type: integer
          description: Distinct buyers who had at least one prior order before this window.
        retentionPct:
          type: number
          description: returningBuyers / (newBuyers + returningBuyers) * 100.
      required:
        - revenue
        - orders
        - avgTicket
        - conversionRate
        - approvalRate
        - leads
        - approvedLeads
        - customers
        - repeatCustomers
        - requestedRevenue
        - newBuyers
        - returningBuyers
        - retentionPct

    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
        value:
          type: number
      required: [date, value]

    CategoryShare:
      type: object
      properties:
        category:
          type: string
        revenue:
          type: number
        orders:
          type: integer
      required: [category, revenue, orders]

    DashboardResponse:
      type: object
      properties:
        kpis:
          $ref: "#/components/schemas/DashboardKpis"
        revenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        ordersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        leadsOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        revenueByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryShare"
        prevKpis:
          allOf:
            - $ref: "#/components/schemas/DashboardKpis"
          description: |
            Equivalent KPI totals for the immediately preceding period of
            the same length. Only present when the request was made with
            `compare=true`.
        prevRevenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: |
            Daily revenue series for the prior comparison period. Only
            present when the request was made with `compare=true`.
        prevOrdersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: |
            Daily order count series for the prior comparison period.
            Only present when the request was made with `compare=true`.
        newBuyersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: Daily new-buyer count (first purchase in the window).
        returningBuyersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: Daily returning-buyer count (prior purchases before window).
        signals:
          type: array
          items:
            $ref: "#/components/schemas/DashboardSignal"
          description: Computed business signals for the current period.
      required:
        - kpis
        - revenueOverTime
        - ordersOverTime
        - leadsOverTime
        - revenueByCategory
        - newBuyersOverTime
        - returningBuyersOverTime
        - signals

    PlatformKpis:
      type: object
      properties:
        revenue:
          type: number
        orders:
          type: integer
        customers:
          type: integer
        avgOrderValue:
          type: number
        activeClients:
          type: integer
          description: Number of clients with > 0 orders in the window.
        totalClients:
          type: integer
        adSpend:
          type: number
          description: Total prorated ad spend summed across all brands in the window.
        roas:
          type: number
          description: Platform ROAS — total revenue divided by total ad spend.
        totalLeads:
          type: integer
          description: Total prorated ad-channel leads (REGISTRATION events) across all brands.
        approvedLeads:
          type: integer
          description: Total prorated approved leads across all brands.
      required:
        - revenue
        - orders
        - customers
        - avgOrderValue
        - activeClients
        - totalClients
        - adSpend
        - roas
        - totalLeads
        - approvedLeads

    PlatformClientStat:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        currency:
          type: string
        locale:
          type: string
        revenue:
          type: number
        orders:
          type: integer
        prevRevenue:
          type: number
        growthPct:
          type: ["number", "null"]
          description: |
            Period-over-period revenue growth in percent. `null` when both the
            current and prior windows had zero revenue.
      required: [id, name, currency, locale, revenue, orders, prevRevenue, growthPct]

    PlatformOverviewResponse:
      type: object
      properties:
        kpis:
          $ref: "#/components/schemas/PlatformKpis"
        prevKpis:
          $ref: "#/components/schemas/PlatformKpis"
        revenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: Daily revenue summed across every client in the window.
        ordersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: Daily order count summed across every client.
        leadsOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: Daily lead count (REGISTRATION events) summed across every client.
        prevRevenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        prevOrdersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        prevLeadsOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        clientStats:
          type: array
          items:
            $ref: "#/components/schemas/PlatformClientStat"
          description: Per-client revenue/orders/growth for the window.
        topPerformers:
          type: array
          items:
            $ref: "#/components/schemas/PlatformClientStat"
          description: Top 5 clients by revenue in the window.
        topGrowth:
          type: array
          items:
            $ref: "#/components/schemas/PlatformClientStat"
          description: Top 5 clients by period-over-period growth.
        bottomGrowth:
          type: array
          items:
            $ref: "#/components/schemas/PlatformClientStat"
          description: Bottom 5 clients by period-over-period growth.
      required:
        - kpis
        - prevKpis
        - revenueOverTime
        - ordersOverTime
        - leadsOverTime
        - prevRevenueOverTime
        - prevOrdersOverTime
        - prevLeadsOverTime
        - clientStats
        - topPerformers
        - topGrowth
        - bottomGrowth

    FunnelStep:
      type: object
      properties:
        step:
          type: string
        label:
          type: string
        count:
          type: integer
        conversionRate:
          type: number
        dropOffRate:
          type: number
      required: [step, label, count, conversionRate, dropOffRate]

    FunnelPath:
      type: object
      properties:
        steps:
          type: array
          items:
            type: string
        visitCount:
          type: integer
        conversionRate:
          type: number
      required: [steps, visitCount, conversionRate]

    FunnelResponse:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStep"
        overallConversion:
          type: number
        insights:
          type: array
          items:
            type: string
        avgEventsBeforePurchase:
          type: number
        topPaths:
          type: array
          items:
            $ref: "#/components/schemas/FunnelPath"
        suggestedActions:
          type: array
          items:
            type: string
      required: [steps, overallConversion, insights, avgEventsBeforePurchase, topPaths, suggestedActions]

    JourneyKpis:
      type: object
      properties:
        avgEventsBeforePurchase:
          type: number
        avgTimeToFirstPurchaseDays:
          type: ["number", "null"]
        avgTimeBetweenPurchasesDays:
          type: ["number", "null"]
        pctBuyersFromFirstSession:
          type: number
      required: [avgEventsBeforePurchase, avgTimeToFirstPurchaseDays, avgTimeBetweenPurchasesDays, pctBuyersFromFirstSession]

    JourneyEventNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        count:
          type: integer
        layer:
          type: integer
      required: [id, label, count, layer]

    JourneyEventEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        count:
          type: integer
      required: [source, target, count]

    JourneyEventCounts:
      type: object
      properties:
        eventType:
          type: string
        count:
          type: integer
      required: [eventType, count]

    JourneyUtmSource:
      type: object
      properties:
        source:
          type: string
        count:
          type: integer
      required: [source, count]

    JourneyAudience:
      type: object
      properties:
        avgSessionDepth:
          type: number
        eventCounts:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEventCounts"
        topUtmSources:
          type: array
          items:
            $ref: "#/components/schemas/JourneyUtmSource"
      required: [avgSessionDepth, eventCounts, topUtmSources]

    JourneyResponse:
      type: object
      properties:
        kpis:
          $ref: "#/components/schemas/JourneyKpis"
        topPaths:
          type: array
          items:
            $ref: "#/components/schemas/FunnelPath"
        eventNodes:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEventNode"
        eventEdges:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEventEdge"
        buyers:
          $ref: "#/components/schemas/JourneyAudience"
        nonBuyers:
          $ref: "#/components/schemas/JourneyAudience"
      required: [kpis, topPaths, eventNodes, eventEdges, buyers, nonBuyers]

    RfmSegmentSummary:
      type: object
      properties:
        segment:
          type: string
        customerCount:
          type: integer
        revenue:
          type: number
        avgTicket:
          type: number
        pct:
          type: number
      required: [segment, customerCount, revenue, avgTicket, pct]

    RfmCompositionPoint:
      type: object
      properties:
        month:
          type: string
        Champions:
          type: integer
        Loyal:
          type: integer
        Potential:
          type: integer
        AtRisk:
          type: integer
        Lost:
          type: integer
      required: [month, Champions, Loyal, Potential, AtRisk, Lost]

    RfmCustomerRow:
      type: object
      properties:
        id:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: string
        segment:
          type: ["string", "null"]
        recencyDays:
          type: ["integer", "null"]
        frequency:
          type: integer
        monetary:
          type: number
      required: [id, email, frequency, monetary]

    RfmResponse:
      type: object
      properties:
        segments:
          type: array
          items:
            $ref: "#/components/schemas/RfmSegmentSummary"
        composition:
          type: array
          items:
            $ref: "#/components/schemas/RfmCompositionPoint"
        customers:
          type: array
          items:
            $ref: "#/components/schemas/RfmCustomerRow"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [segments, composition, customers, total, page, limit]

    Customer:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        utmSource:
          type: ["string", "null"]
        utmMedium:
          type: ["string", "null"]
        utmCampaign:
          type: ["string", "null"]
        registrationStatus:
          type: string
        approvalDate:
          type: ["string", "null"]
          format: date-time
        rfmSegment:
          type: ["string", "null"]
        recencyScore:
          type: ["integer", "null"]
        frequencyScore:
          type: ["integer", "null"]
        monetaryScore:
          type: ["integer", "null"]
        totalOrders:
          type: integer
        totalSpent:
          type: number
        firstPurchaseAt:
          type: ["string", "null"]
          format: date-time
        lastPurchaseAt:
          type: ["string", "null"]
          format: date-time
        opportunityLevel:
          type: ["string", "null"]
          description: "Derived tier: CHAMPION | HIGH | MEDIUM | LOW"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - email
        - registrationStatus
        - totalOrders
        - totalSpent
        - createdAt

    PaginatedCustomers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
        segmentCounts:
          type: array
          items:
            type: object
            properties:
              segment:
                type: string
              count:
                type: integer
            required: [segment, count]
      required: [data, total, page, pages, segmentCounts]

    ProductMetrics:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        price:
          type: number
        cost:
          type: ["number", "null"]
        stock:
          type: integer
        restockThreshold:
          type: integer
        totalSold:
          type: integer
        totalRevenue:
          type: number
        status:
          type: string
        imageUrl:
          type: ["string", "null"]
        percentSold:
          type: number
          description: totalSold / (totalSold + stock), as a fraction 0–1.
        level:
          type: string
          enum: [High Conversion, Standard, Low, At Risk]
          description: Performance tier derived from sell-through and stock health.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sku
        - name
        - price
        - stock
        - restockThreshold
        - totalSold
        - totalRevenue
        - status
        - percentSold
        - level
        - createdAt

    ProductDetailResponse:
      type: object
      properties:
        product:
          type: object
          properties:
            id:
              type: string
            sku:
              type: string
            name:
              type: string
            description:
              type: ["string", "null"]
            category:
              type: ["string", "null"]
            price:
              type: number
            cost:
              type: ["number", "null"]
            stock:
              type: integer
            restockThreshold:
              type: integer
            imageUrl:
              type: ["string", "null"]
            totalSold:
              type: integer
            totalRevenue:
              type: number
            status:
              type: string
            percentSold:
              type: number
            level:
              type: string
              enum: [High Conversion, Standard, Low, At Risk]
            createdAt:
              type: string
              format: date-time
          required:
            - id
            - sku
            - name
            - price
            - stock
            - restockThreshold
            - totalSold
            - totalRevenue
            - status
            - percentSold
            - level
            - createdAt
        kpis:
          type: object
          properties:
            totalRevenue:
              type: number
            totalUnitsSold:
              type: integer
            avgTicket:
              type: number
            uniqueBuyers:
              type: integer
            percentSold:
              type: number
          required:
            - totalRevenue
            - totalUnitsSold
            - avgTicket
            - uniqueBuyers
            - percentSold
        revenueOverTime:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: number
              units:
                type: integer
            required: [date, revenue, units]
        prevRevenueOverTime:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: number
              units:
                type: integer
            required: [date, revenue, units]
        byColor:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              units:
                type: integer
              revenue:
                type: number
            required: [label, units, revenue]
        bySize:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              units:
                type: integer
              revenue:
                type: number
            required: [label, units, revenue]
        byState:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              units:
                type: integer
              revenue:
                type: number
            required: [label, units, revenue]
      required:
        - product
        - kpis
        - revenueOverTime
        - prevRevenueOverTime
        - byColor
        - bySize
        - byState

    ProductCustomersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              customerId:
                type: string
              name:
                type: string
              email:
                type: string
              rfmSegment:
                type: ["string", "null"]
