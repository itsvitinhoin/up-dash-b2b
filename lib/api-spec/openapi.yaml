openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UP Dash - B2B fashion analytics intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client (brand) management
  - name: analytics
    description: Analytics & reporting
  - name: notifications
    description: Notification center
  - name: savedViews
    description: Saved dashboard views
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout (optionally revoke a refresh token server-side)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients (admin only)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedClients"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client by id
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/dashboard:
    get:
      operationId: getDashboard
      tags: [analytics]
      summary: Dashboard KPIs and time-series
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: category
          schema:
            type: string
          description: Restrict revenue/order metrics to a single product category.
        - in: query
          name: sellerId
          schema:
            type: string
          description: Restrict order metrics to a single seller.
        - in: query
          name: channel
          schema:
            type: string
          description: Restrict to orders from customers acquired via a UTM source (e.g. instagram, google).
        - in: query
          name: segment
          schema:
            type: string
          description: Restrict to orders from customers in a specific RFM segment (VIP, Loyal, etc.).
        - in: query
          name: compare
          schema:
            type: boolean
          description: |
            When true, the response also includes prior-period equivalents
            (`prevKpis`, `prevRevenueOverTime`, `prevOrdersOverTime`) covering
            the immediately preceding window of the same length. Use this so
            the client can render accurate "vs. previous period" change
            indicators in a single request.
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  /analytics/funnel:
    get:
      operationId: getFunnel
      tags: [analytics]
      summary: Conversion funnel analytics
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Funnel payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"

  /analytics/customers:
    get:
      operationId: getCustomers
      tags: [analytics]
      summary: Paginated customers with RFM segmentation
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: rfmSegment
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCustomers"

  /analytics/products:
    get:
      operationId: getProducts
      tags: [analytics]
      summary: Product performance ranking
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [revenue, units, created]
            default: revenue
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring match against the SKU or product name.
        - in: query
          name: sku
          schema:
            type: string
          description: Case-insensitive substring match against the SKU only (legacy).
        - in: query
          name: category
          schema:
            type: string
          description: Exact-match filter on product category.
      responses:
        "200":
          description: Product list with metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductMetrics"

  /analytics/sellers:
    get:
      operationId: getSellers
      tags: [analytics]
      summary: Seller leaderboard
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Ranked seller list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellerMetrics"

  /analytics/geography:
    get:
      operationId: getGeography
      tags: [analytics]
      summary: Geographic breakdown by state and city
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Geography payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeographyResponse"

  /analytics/orders:
    get:
      operationId: getOrdersByDate
      tags: [analytics]
      summary: Drill-down list of orders for a single day
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Orders payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersByDateResponse"

  /analytics/insight:
    get:
      operationId: getInsight
      tags: [analytics]
      summary: AI-generated insight for current dashboard window
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Insight payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"
    post:
      operationId: regenerateInsight
      tags: [analytics]
      summary: Force regenerate the AI insight (skip cache)
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Insight payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"

  /analytics/alerts:
    get:
      operationId: getAlerts
      tags: [analytics]
      summary: Inventory alerts (low stock and predicted stockouts)
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: horizonDays
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
          description: Days ahead to predict stockouts based on recent sales velocity.
        - in: query
          name: lookbackDays
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 180
          description: Days of recent sales used to compute average daily demand.
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Inventory alerts payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current client/tenant
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Notification list with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark every notification for this client as read
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"

  /notifications/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationReadRequest"
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-views:
    get:
      operationId: listSavedViews
      tags: [savedViews]
      summary: List the current user's saved views for the active client
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: Saved view list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedView"
    post:
      operationId: createSavedView
      tags: [savedViews]
      summary: Save the current dashboard filter set as a named view
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedViewRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"

  /saved-views/{viewId}:
    delete:
      operationId: deleteSavedView
      tags: [savedViews]
      summary: Delete a saved view owned by the current user
      parameters:
        - in: path
          name: viewId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
          enum: [ok, error]
        uptime:
          type: number
      required: [status, db, uptime]

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        code:
          type: string
        message:
          type: string
        status:
          type: integer
      required: [error, code, message, status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, CLIENT]
        clientId:
          type: ["string", "null"]
      required: [id, email, firstName, lastName, role]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [accessToken, refreshToken, user]

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        apiKey:
          type: string
        revenueYtd:
          type: number
        ordersYtd:
          type: integer
        leadsYtd:
          type: integer
        approvedLeads:
          type: integer
        isActive:
          type: boolean
        currency:
          type: string
          description: ISO 4217 currency code, e.g. BRL, USD
        locale:
          type: string
          description: BCP 47 locale, e.g. pt-BR, en-US
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - apiKey
        - revenueYtd
        - ordersYtd
        - leadsYtd
        - approvedLeads
        - isActive
        - currency
        - locale
        - createdAt
        - updatedAt

    PaginatedClients:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [data, total, page, pages]

    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        apiKey:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code (default BRL)
        locale:
          type: string
          description: BCP 47 locale (default pt-BR)
      required: [name, email, apiKey]

    DashboardKpis:
      type: object
      properties:
        revenue:
          type: number
        orders:
          type: integer
        avgTicket:
          type: number
        conversionRate:
          type: number
        approvalRate:
          type: number
        leads:
          type: integer
        approvedLeads:
          type: integer
        customers:
          type: integer
        repeatCustomers:
          type: integer
      required:
        - revenue
        - orders
        - avgTicket
        - conversionRate
        - approvalRate
        - leads
        - approvedLeads
        - customers
        - repeatCustomers

    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
        value:
          type: number
      required: [date, value]

    CategoryShare:
      type: object
      properties:
        category:
          type: string
        revenue:
          type: number
        orders:
          type: integer
      required: [category, revenue, orders]

    DashboardResponse:
      type: object
      properties:
        kpis:
          $ref: "#/components/schemas/DashboardKpis"
        revenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        ordersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        leadsOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        revenueByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryShare"
        prevKpis:
          allOf:
            - $ref: "#/components/schemas/DashboardKpis"
          description: |
            Equivalent KPI totals for the immediately preceding period of
            the same length. Only present when the request was made with
            `compare=true`.
        prevRevenueOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: |
            Daily revenue series for the prior comparison period. Only
            present when the request was made with `compare=true`.
        prevOrdersOverTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
          description: |
            Daily order count series for the prior comparison period.
            Only present when the request was made with `compare=true`.
      required:
        - kpis
        - revenueOverTime
        - ordersOverTime
        - leadsOverTime
        - revenueByCategory

    FunnelStep:
      type: object
      properties:
        step:
          type: string
        label:
          type: string
        count:
          type: integer
        conversionRate:
          type: number
        dropOffRate:
          type: number
      required: [step, label, count, conversionRate, dropOffRate]

    FunnelResponse:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStep"
        overallConversion:
          type: number
        insights:
          type: array
          items:
            type: string
      required: [steps, overallConversion, insights]

    Customer:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        registrationStatus:
          type: string
        rfmSegment:
          type: ["string", "null"]
        recencyScore:
          type: ["integer", "null"]
        frequencyScore:
          type: ["integer", "null"]
        monetaryScore:
          type: ["integer", "null"]
        totalOrders:
          type: integer
        totalSpent:
          type: number
        firstPurchaseAt:
          type: ["string", "null"]
          format: date-time
        lastPurchaseAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - email
        - registrationStatus
        - totalOrders
        - totalSpent
        - createdAt

    PaginatedCustomers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
        segmentCounts:
          type: array
          items:
            type: object
            properties:
              segment:
                type: string
              count:
                type: integer
            required: [segment, count]
      required: [data, total, page, pages, segmentCounts]

    ProductMetrics:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        price:
          type: number
        stock:
          type: integer
        restockThreshold:
          type: integer
        totalSold:
          type: integer
        totalRevenue:
          type: number
        status:
          type: string
      required:
        - id
        - sku
        - name
        - price
        - stock
        - restockThreshold
        - totalSold
        - totalRevenue
        - status

    InventoryAlert:
      type: object
      properties:
        productId:
          type: string
        sku:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        stock:
          type: integer
        restockThreshold:
          type: integer
        averageDailySales:
          type: number
          description: Average units sold per day during the lookback window.
        daysOfCover:
          type: ["number", "null"]
          description: Days of stock remaining at the recent sales rate. Null when there were no recent sales.
        type:
          type: string
          enum: [LOW_STOCK, PREDICTED_STOCKOUT, OUT_OF_STOCK]
        severity:
          type: string
          enum: [critical, warning]
        message:
          type: string
      required:
        - productId
        - sku
        - name
        - stock
        - restockThreshold
        - averageDailySales
        - type
        - severity
        - message

    AlertsResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/InventoryAlert"
        counts:
          type: object
          properties:
            total:
              type: integer
            critical:
              type: integer
            warning:
              type: integer
            outOfStock:
              type: integer
            lowStock:
              type: integer
            predictedStockout:
              type: integer
          required: [total, critical, warning, outOfStock, lowStock, predictedStockout]
        horizonDays:
          type: integer
        lookbackDays:
          type: integer
      required: [alerts, counts, horizonDays, lookbackDays]

    SellerMetrics:
      type: object
      properties:
        id:
